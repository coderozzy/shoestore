services:
  db:
    image: postgres:15-alpine
    container_name: shoestore-db
    # Bind only to the loopback interface so the database is reachable for
    # `psql` on the host but never exposed on the LAN. Remove entirely in prod.
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: shoestore-backend
    # No host port — the reverse proxy is the only public entry point.
    # Headers, CSP, and rate limits in nginx would be bypassed if the backend
    # port were reachable directly.
    expose:
      - "8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:?POSTGRES_DB required}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:?POSTGRES_USER required}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      # JWT_SECRET is required — no default, fail fast if missing.
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET required (openssl rand -base64 48)}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-900000}
      JWT_ISSUER: ${JWT_ISSUER:-shoestore-backend}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-shoestore-clients}
      ORDER_TOKEN_SECRET: ${ORDER_TOKEN_SECRET:-}
      ORDER_TOKEN_TTL_MS: ${ORDER_TOKEN_TTL_MS:-604800000}
      BOOTSTRAP_USERS_ENABLED: ${BOOTSTRAP_USERS_ENABLED:-true}
      BOOTSTRAP_ADMIN_USERNAME: ${BOOTSTRAP_ADMIN_USERNAME:-admin}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-admin@shoestore.local}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_CURRENCY: ${STRIPE_CURRENCY:-try}
      AI_IMAGE_API_KEY: ${AI_IMAGE_API_KEY:-}
      AI_IMAGE_MODEL: ${AI_IMAGE_MODEL:-gemini-2.5-flash-image}
      AI_IMAGE_MAX_BYTES: ${AI_IMAGE_MAX_BYTES:-10000000}
      # Order-confirmation email. Leave SPRING_MAIL_HOST blank in dev to
      # disable mail entirely (OrderEmailService logs and no-ops).
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}
      SPRING_MAIL_SMTP_AUTH: ${SPRING_MAIL_SMTP_AUTH:-true}
      SPRING_MAIL_STARTTLS: ${SPRING_MAIL_STARTTLS:-true}
      APP_MAIL_FROM: ${APP_MAIL_FROM:-Steps Store <noreply@example.com>}
      # Used to build absolute "Track your order" links in the email.
      # Must match whatever public origin the customer hits the gateway on.
      APP_PUBLIC_BASE_URL: ${APP_PUBLIC_BASE_URL:-http://localhost:3000}
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-INFO}
      # AUTH_COOKIE_SECURE=false is appropriate for local HTTP dev only.
      # Flip to true in any environment that terminates TLS.
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
    depends_on:
      db:
        condition: service_healthy

  staff-pwa:
    container_name: shoestore-staff-pwa
    expose:
      - "80"
    build:
      context: ./staff-pwa
      args:
        VITE_BASENAME: /app/
    depends_on:
      - backend

  admin-web:
    build:
      context: .
      dockerfile: admin-web/Dockerfile
    container_name: shoestore-admin-web
    expose:
      - "80"
    depends_on:
      - backend

  storefront-web:
    container_name: shoestore-storefront-web
    expose:
      - "80"
    build:
      context: ./storefront-web
      args:
        VITE_STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
    depends_on:
      - backend

  reverse-proxy:
    image: nginx:alpine
    container_name: shoestore-gateway
    # Public surface is intentionally a single nginx process: it holds the CSP,
    # security headers, rate limits, and the raw-body webhook location.
    ports:
      - "3000:80"
    volumes:
      - ./reverse-proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - staff-pwa
      - admin-web
      - storefront-web

volumes:
  postgres_data:
