services:
  db:
    image: postgres:15-alpine
    container_name: shoestore-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: shoestore
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: shoestore-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/shoestore
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JWT_SECRET: ${JWT_SECRET:-mySecretKeyForJWTTokenGenerationThatIsAtLeast256BitsLongForHS256Algorithm}
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:3003,http://localhost:8080
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_CURRENCY: ${STRIPE_CURRENCY:-try}
    depends_on:
      db:
        condition: service_healthy

  staff-pwa:
    container_name: shoestore-staff-pwa
    ports:
      - "3001:80"
    build:
      context: ./staff-pwa
      args:
        VITE_BASENAME: /app/
    depends_on:
      - backend

  admin-web:
    build:
      context: .
      dockerfile: admin-web/Dockerfile
    container_name: shoestore-admin-web
    ports:
      - "3002:80"
    depends_on:
      - backend

  storefront-web:
    container_name: shoestore-storefront-web
    ports:
      - "3003:80"
    build:
      context: ./storefront-web
      args:
        VITE_STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
    depends_on:
      - backend

  reverse-proxy:
    image: nginx:alpine
    container_name: shoestore-gateway
    ports:
      - "3000:80"
    volumes:
      - ./reverse-proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - staff-pwa
      - admin-web
      - storefront-web

volumes:
  postgres_data:
