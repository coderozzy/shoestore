server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Admin SPA is served under /admin/ so that it coexists with the staff
    # app (/app/) and the storefront (/store/) behind the reverse proxy.

    # Static assets — strip prefix then serve with caching headers.
    location ~* ^/admin/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        rewrite ^/admin/(.*)$ /$1 break;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — strip prefix, try file, then fall back to index.html.
    location /admin/ {
        rewrite ^/admin/(.*)$ /$1 break;
        try_files $uri $uri/ /index.html;
    }

    location = /admin {
        return 302 /admin/;
    }
}
