# NOTE: this vhost is HTTP-only for local development.
# In production it MUST sit behind a TLS-terminating proxy (Caddy/Traefik/ALB)
# and HSTS should be added once HTTPS is enforced end-to-end.

# Per-IP rate limit buckets. Defined at http{} via a conf.d snippet would be
# cleaner, but Docker mounts only this file, so we declare them here.
limit_req_zone $binary_remote_addr zone=login_zone:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=checkout_zone:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api_zone:10m rate=60r/s;

# Bound the connection count per IP so a single client can't exhaust sockets.
limit_conn_zone $binary_remote_addr zone=conn_zone:10m;

server {
    listen 80;
    server_name localhost;
    resolver 127.0.0.11 valid=10s;
    client_max_body_size 12m;
    server_tokens off;

    # Shared security headers — applied to every response regardless of location.
    # `always` is required so these land on error responses too.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(self), microphone=(), geolocation=()" always;
    # CSP locks script execution to same-origin + Stripe, disallows framing, and
    # blocks plugins. img-src keeps data: and blob: for AI-generated product
    # previews and QR blobs.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://js.stripe.com; frame-src https://js.stripe.com; connect-src 'self' https://api.stripe.com; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;

    limit_conn conn_zone 50;

    # Stripe webhook needs the raw body to verify the HMAC signature. Must be
    # declared before the generic /api/ block so it wins the match.
    location = /api/storefront/checkout/webhook {
        proxy_request_buffering off;
        proxy_pass http://backend:8080/api/storefront/checkout/webhook;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Credential-stuffing guard: 5 login attempts/minute per IP, tiny burst.
    location = /api/auth/login {
        limit_req zone=login_zone burst=3 nodelay;
        proxy_pass http://backend:8080/api/auth/login;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Storefront checkout — abuse here reserves stock and creates PaymentIntents.
    location ~ ^/api/storefront/checkout/ {
        limit_req zone=checkout_zone burst=5 nodelay;
        proxy_pass http://backend:8080$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Generic backend API, shared by all three frontends.
    location /api/ {
        limit_req zone=api_zone burst=40 nodelay;
        proxy_pass http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /app/ {
        proxy_pass http://staff-pwa:80/app/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location = /app {
        return 302 /app/;
    }

    location /admin/ {
        proxy_pass http://admin-web:80/admin/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location = /admin {
        return 302 /admin/;
    }

    location /store/ {
        proxy_pass http://storefront-web:80/store/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location = /store {
        return 302 /store/;
    }

    location = / {
        return 302 /store/;
    }

    location / {
        return 302 /store/;
    }
}
