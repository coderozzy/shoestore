server {
    listen 80;
    server_name localhost;
    resolver 127.0.0.11 valid=10s;

    # Backend API (shared by all three frontends).
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Staff PWA (QR scanning + stock management for employees).
    location /app/ {
        proxy_pass http://staff-pwa:80/app/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location = /app {
        return 302 /app/;
    }

    # Admin SPA (dashboard, orders, discounts, staff sales).
    location /admin/ {
        proxy_pass http://admin-web:80/admin/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location = /admin {
        return 302 /admin/;
    }

    # Customer storefront (online shop).
    location /store/ {
        proxy_pass http://storefront-web:80/store/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location = /store {
        return 302 /store/;
    }

    # Root — send visitors to the store by default.
    location = / {
        return 302 /store/;
    }

    # Catch-all — redirect unmatched paths (e.g. /login) to the store.
    location / {
        return 302 /store/;
    }
}
