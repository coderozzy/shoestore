server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Served behind the reverse proxy at /store/.
    # Static assets — strip prefix then serve with caching headers.
    location ~* ^/store/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        rewrite ^/store/(.*)$ /$1 break;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — strip prefix, try file, then fall back to index.html.
    location /store/ {
        rewrite ^/store/(.*)$ /$1 break;
        try_files $uri $uri/ /index.html;
    }

    location = /store {
        return 302 /store/;
    }
}
