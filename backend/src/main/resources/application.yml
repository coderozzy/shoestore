server:
  port: 8080
  # Hide the Spring Boot / embedded server version from error responses.
  error:
    include-stacktrace: never
    include-message: never

spring:
  application:
    name: shoestore-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:5433/shoestore}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # SMTP for the customer order-confirmation email. All values are env-driven
  # so secrets never live in this file. Leave SPRING_MAIL_HOST blank in dev
  # to disable mail entirely — OrderEmailService logs and no-ops in that mode.
  mail:
    host: ${SPRING_MAIL_HOST:}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${SPRING_MAIL_STARTTLS:true}
          # Conservative timeouts so a misbehaving SMTP server can't
          # pin the @Async worker thread indefinitely.
          connectiontimeout: 5000
          timeout: 10000
          writetimeout: 10000

# JWT. JWT_SECRET is required — the application refuses to start if it is missing,
# too short, or not base64 (see JwtTokenProvider).
# Generate with:  openssl rand -base64 48
jwt:
  secret: ${JWT_SECRET}
  # 15-minute access token. Short TTL bounds the blast radius of a stolen
  # cookie; the token_version column on `users` gives the admin a forced
  # logout lever for anything in the meantime.
  expiration: ${JWT_EXPIRATION_MS:900000}
  issuer: ${JWT_ISSUER:shoestore-backend}
  audience: ${JWT_AUDIENCE:shoestore-clients}

# Browser-facing auth cookie. Secure=true requires HTTPS end-to-end; flip via
# env in plain-HTTP dev (docker-compose sets AUTH_COOKIE_SECURE=false there).
auth:
  cookie:
    secure: ${AUTH_COOKIE_SECURE:true}
    same-site: ${AUTH_COOKIE_SAMESITE:Strict}

# App configuration
app:
  cors:
    # Must be an explicit, tight list in production.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

  # Customer order lookup token. Signed HMAC tied to orderId+paymentIntentId.
  order-token:
    secret: ${ORDER_TOKEN_SECRET:${JWT_SECRET}}
    ttl-ms: ${ORDER_TOKEN_TTL_MS:604800000}

  # Used by OrderEmailService when constructing the magic "track your
  # order" link in the confirmation email. Must match whatever public URL
  # customers actually hit (i.e. the reverse-proxy origin in dev/prod).
  public-base-url: ${APP_PUBLIC_BASE_URL:http://localhost:3000}

  mail:
    # `From` header on outbound mail. Most SMTP relays require this to
    # match the authenticated mailbox; we only enforce it's non-blank
    # when SMTP is itself configured.
    from: ${APP_MAIL_FROM:Steps Store <noreply@example.com>}

  # Bootstrap admin — applied only on first boot when users table is empty.
  bootstrap:
    enabled: ${BOOTSTRAP_USERS_ENABLED:true}
    admin-username: ${BOOTSTRAP_ADMIN_USERNAME:admin}
    admin-password: ${BOOTSTRAP_ADMIN_PASSWORD:}
    admin-email: ${BOOTSTRAP_ADMIN_EMAIL:admin@shoestore.local}

ai:
  image:
    api-key: ${AI_IMAGE_API_KEY:}
    model: ${AI_IMAGE_MODEL:gemini-2.5-flash-image}
    max-bytes: ${AI_IMAGE_MAX_BYTES:10000000}

# Stripe
stripe:
  secret-key: ${STRIPE_SECRET_KEY:}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
  currency: ${STRIPE_CURRENCY:try}

logging:
  level:
    # INFO by default; devs flip to DEBUG via APP_LOG_LEVEL=DEBUG at runtime.
    com.shoestore: ${APP_LOG_LEVEL:INFO}
    org.springframework.security: INFO
