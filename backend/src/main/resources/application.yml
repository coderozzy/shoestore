server:
  port: 8080

spring:
  application:
    name: shoestore-backend

  datasource:
    url: jdbc:postgresql://127.0.0.1:5433/shoestore
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:9a4f2c8d3b7e1g5h9j2k4l6m8n0p2q4r6t8w0y2z4x6v8u0s2q4o6m8k0i}
  expiration: 86400000  # 24 hours in milliseconds

# App configuration
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# Logging
logging:
  level:
    com.shoestore: DEBUG
    org.springframework.security: INFO
